name: daily-briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [kr_bio, data_info, fintech_platform, industrial_luxury]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: ./.venv/bin/python -m pip install -e .[dev]
      - run: ./.venv/bin/python -m pytest tests -v
      - run: ./.venv/bin/python -m daily_stock_briefing.jobs.run_daily_briefing --date "$(TZ=Asia/Seoul date +%F)" --group "${{ matrix.group }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_BASE_URL: ${{ secrets.NEWS_API_BASE_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          LLM_PROVIDER: auto
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_RPM_LIMIT: ${{ secrets.LLM_RPM_LIMIT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_LLM_MODEL: ${{ secrets.NVIDIA_LLM_MODEL }}
          LLM_API_BASE_URL: ${{ secrets.LLM_API_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      - uses: actions/upload-artifact@v7
        with:
          name: daily-briefing-reports-${{ matrix.group }}
          path: reports/
